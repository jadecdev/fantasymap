<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ Carte Fantasy du 77 - Seine-et-Marne</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Crimson Text', Georgia, serif;
    background: #1a1408;
    color: #e8d5b0;
    overflow: hidden;
    height: 100vh;
  }

  #header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: linear-gradient(180deg, #1a1408 0%, #1a1408ee 70%, #1a140800 100%);
    padding: 14px 24px 28px;
    text-align: center;
  }

  #header h1 {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 1.6rem;
    color: #c9a84c;
    text-shadow: 0 0 20px rgba(201,168,76,0.4), 0 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  #header p {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: #a0896a;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  #header p.credit {
    font-size: 0.72rem;
    color: #8a7454;
    margin-top: 2px;
    letter-spacing: 0.5px;
  }
  #header p.credit a {
    color: #c9a84c;
    text-decoration: none;
    border-bottom: 1px dotted #c9a84c66;
  }
  #header p.credit a:hover { color: #e8c870; border-bottom-color: #e8c870; }

  #map {
    width: 100%;
    height: 100vh;
  }

  /* Override Leaflet tiles for a darker fantasy look */
  .leaflet-tile-pane { filter: saturate(0.3) brightness(0.55) sepia(0.4) hue-rotate(-10deg); }
  .leaflet-control-zoom a {
    background: #2a2010 !important;
    color: #c9a84c !important;
    border-color: #5a4a2a !important;
  }
  .leaflet-control-zoom a:hover { background: #3a3020 !important; }
  .leaflet-control-attribution { display: none !important; }

  /* Custom marker */
  .fantasy-marker {
    position: relative;
    cursor: pointer;
    transition: transform 0.3s ease;
  }
  .fantasy-marker:hover { transform: scale(1.2); }

  .marker-icon {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border-radius: 50%;
    border: 2px solid #c9a84c;
    background: radial-gradient(circle at 30% 30%, #3a2a10, #1a1408);
    box-shadow: 0 0 12px rgba(201,168,76,0.5), 0 0 24px rgba(201,168,76,0.2), inset 0 0 8px rgba(201,168,76,0.15);
    position: relative;
  }
  .marker-icon::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 8px solid #c9a84c;
  }

  /* Popup styling */
  .leaflet-popup-content-wrapper {
    background: linear-gradient(135deg, #2a1f0e, #1a1408) !important;
    border: 1px solid #5a4a2a !important;
    border-radius: 4px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 20px rgba(201,168,76,0.15) !important;
    padding: 0 !important;
    max-width: 320px;
  }
  .leaflet-popup-tip { background: #2a1f0e !important; border: 1px solid #5a4a2a !important; }
  .leaflet-popup-close-button {
    color: #c9a84c !important;
    font-size: 20px !important;
    top: 6px !important;
    right: 8px !important;
  }
  .leaflet-popup-content { margin: 0 !important; }

  .popup-inner {
    padding: 16px 18px;
    min-width: 240px;
  }
  .popup-inner .city-name {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: #c9a84c;
    margin-bottom: 2px;
    letter-spacing: 1px;
  }
  .popup-inner .city-race {
    font-family: 'MedievalSharp', cursive;
    font-size: 0.9rem;
    color: #d4a853;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .popup-inner .city-race .race-icon { font-size: 1.1rem; }
  .popup-inner .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #5a4a2a, transparent);
    margin: 8px 0;
  }
  .popup-inner .description {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: 0.92rem;
    color: #c8b48a;
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .popup-inner .pop-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(201,168,76,0.1);
    border: 1px solid #5a4a2a;
    border-radius: 3px;
    padding: 4px 10px;
    font-size: 0.8rem;
    color: #a0896a;
  }
  .popup-inner .pop-badge .pop-number {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: #c9a84c;
    font-size: 0.9rem;
  }

  /* Legend */
  #legend {
    position: fixed;
    bottom: 16px;
    left: 16px;
    z-index: 1000;
    background: linear-gradient(135deg, #2a1f0eee, #1a1408ee);
    border: 1px solid #5a4a2a;
    border-radius: 4px;
    padding: 12px 16px;
    max-height: 60vh;
    overflow-y: auto;
    width: 220px;
    backdrop-filter: blur(8px);
  }
  #legend h3 {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: #c9a84c;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    text-align: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    font-size: 0.78rem;
    color: #a0896a;
    cursor: pointer;
    transition: color 0.2s;
  }
  .legend-item:hover { color: #c9a84c; }
  .legend-item .li-icon { font-size: 1rem; width: 22px; text-align: center; }
  .legend-item .li-name { flex: 1; }

  /* Transcript panel */
  #transcript-toggle {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 1001;
    background: #2a1f0e;
    border: 1px solid #c9a84c;
    color: #c9a84c;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  #transcript-toggle:hover { background: #3a2a10; }

  #transcript-panel {
    position: fixed;
    top: 0;
    right: -420px;
    width: 400px;
    height: 100vh;
    z-index: 1002;
    background: linear-gradient(135deg, #2a1f0e, #1a1408);
    border-left: 1px solid #5a4a2a;
    padding: 24px;
    overflow-y: auto;
    transition: right 0.4s cubic-bezier(0.4,0,0.2,1);
    box-shadow: -8px 0 32px rgba(0,0,0,0.5);
  }
  #transcript-panel.open { right: 0; }
  #transcript-panel h2 {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: #c9a84c;
    margin-bottom: 16px;
    letter-spacing: 2px;
  }
  #transcript-panel .close-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: #c9a84c;
    font-size: 1.4rem;
    cursor: pointer;
  }
  .transcript-block {
    margin-bottom: 16px;
    padding: 12px;
    border-left: 2px solid #5a4a2a;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
    border-radius: 0 4px 4px 0;
  }
  .transcript-block:hover {
    border-left-color: #c9a84c;
    background: rgba(201,168,76,0.05);
  }
  .transcript-block .tb-city {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 0.9rem;
    color: #c9a84c;
    margin-bottom: 4px;
  }
  .transcript-block .tb-text {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: 0.88rem;
    color: #a0896a;
    line-height: 1.5;
  }

  @media (max-width: 600px) {
    #legend { display: none; }
    #header h1 { font-size: 1.1rem; }
    #transcript-panel { width: 100vw; right: -100vw; }
  }
</style>
</head>
<body>

<div id="header">
  <h1>⚔️ Carte Fantasy du 77 ⚔️</h1>
  <p>Seine-et-Marne — « Une terre remplie de contes et légendes »</p>
  <p class="credit">Inspiré de <a href="https://www.instagram.com/maxim_penet/reels/" target="_blank" rel="noopener noreferrer">@maxime_penet</a> et de <a href="https://www.instagram.com/reel/DXEIO7stGwS/" target="_blank" rel="noopener noreferrer">sa vidéo Instagram</a></p>
</div>

<div id="map"></div>

<div id="legend">
  <h3>Peuples du 77</h3>
</div>

<button id="transcript-toggle" onclick="toggleTranscript()">📜 Transcript</button>

<div id="transcript-panel">
  <button class="close-btn" onclick="toggleTranscript()">✕</button>
  <h2>📜 Transcript</h2>
</div>

<script>
const cities = [
  {
    name: "Lagny-sur-Marne",
    lat: 48.8725, lng: 2.7125,
    icon: "⚓", race: "Port des contrebandiers",
    description: "Ça c'est le port des contrebandiers fluviaux. Il y a toute une guilde de marchands qui contrôle la rivière.",
    population: 21461
  },
  {
    name: "Fontainebleau",
    lat: 48.4010, lng: 2.7017,
    icon: "🧝", race: "Capitale des Hauts-Elfes",
    description: "Ça c'est carrément la capitale des hauts-elfes. Si t'as pas la bourse pleine, tu es repoussé à la lisière du bois par les gardes elfiques.",
    population: 15583
  },
  {
    name: "Coulommiers",
    lat: 48.8130, lng: 3.0872,
    icon: "⛏️", race: "Clan de Nains",
    description: "C'est un clan de nains. Mais par contre dans leur cave, ils ont pas des minerais, ils font du fromage.",
    population: 16374
  },
  {
    name: "Torcy",
    lat: 48.8500, lng: 2.6536,
    icon: "⚔️", race: "Cité des Guerriers",
    description: "C'est une ville de guerriers. Que des cliquetis dans la rue et il y a un puissant sortilège qui les protège.",
    population: 22810
  },
  {
    name: "Brie-Comte-Robert",
    lat: 48.6914, lng: 2.6119,
    icon: "🍃", race: "Hobbits aristocrates",
    description: "C'est des hobbits un peu aristocrates. L'herbe à pipe y est très bonne.",
    population: 19003
  },
  {
    name: "Savigny-le-Temple",
    lat: 48.5844, lng: 2.5833,
    icon: "🛡️", race: "Templiers",
    description: "Bon bah ça c'est dans le nom, c'est des templiers. Tout le reste de la ville est à leur service.",
    population: 31148
  },
  {
    name: "Melun",
    lat: 48.5422, lng: 2.6553,
    icon: "👹", race: "Forteresse des Trolls",
    description: "Melun c'est la forteresse des trolls. Mais les gros trolls là, genre Seigneur des Anneaux.",
    population: 45995
  },
  {
    name: "Dammarie-les-Lys",
    lat: 48.5178, lng: 2.6342,
    icon: "🎵", race: "Ville des Bardes",
    description: "Ça c'est la ville des bardes. Chaque année on y organise un grand concours de musique et le gagnant repart avec un luth d'or.",
    population: 23559
  },
  {
    name: "Pontault-Combault",
    lat: 48.7697, lng: 2.6053,
    icon: "🏰", race: "Donjon de haut niveau",
    description: "Ça c'est un donjon de haut niveau. Le boss c'est un gros golem. Et tous les habitants c'est des créatures du donjon.",
    population: 39096
  },
  {
    name: "Roissy-en-Brie",
    lat: 48.7917, lng: 2.6503,
    icon: "🌳", race: "Ents",
    description: "C'est des Ents, tout simplement. Donc ne dérange pas les arbres sur place. Et si tu vois un mec parler à un arbre, c'est normal.",
    population: 23229
  },
  {
    name: "Bussy-Saint-Georges",
    lat: 48.8414, lng: 2.6986,
    icon: "🔮", race: "Secte mystérieuse",
    description: "C'est une secte. Ça a l'air calme et accueillant, mais en fait, il s'y passe des trucs. On sait pas bien ce qu'il s'y passe, d'ailleurs.",
    population: 27498
  },
  {
    name: "Mitry-Mory",
    lat: 48.9833, lng: 2.6167,
    icon: "🐴", race: "Centaures",
    description: "C'est une ville de centaures. Ils sont pas agressifs, tant que t'es respectueux de la nature. Y a un bon business d'écurie à faire, là-bas.",
    population: 20456
  },
  {
    name: "Ozoir-la-Ferrière",
    lat: 48.7681, lng: 2.6650,
    icon: "🐺", race: "Clairière des Loups-Garous",
    description: "Ça c'est la clairière des loups-garous. Mais c'est connu, donc si t'es là-bas au mauvais moment, c'est de ta faute.",
    population: 21238
  },
  {
    name: "Meaux",
    lat: 48.9603, lng: 2.8786,
    icon: "👤", race: "Capitale Humaine",
    description: "Mo, c'est la capitale humaine du coin. On y mange très bien, les gens sont très accueillants. Il y a une guilde de tanneurs aussi.",
    population: 56905
  },
  {
    name: "Chelles",
    lat: 48.8828, lng: 2.5958,
    icon: "⚔️", race: "Poste Frontière",
    description: "C'est le poste frontière avant d'aller dans des territoires et des contrées inconnues. Tous ceux qui y vivent sont des gardes qui ont tout abandonné, tout sacrifié pour protéger les autres.",
    population: 54620
  }
];

// Init map
const map = L.map('map', {
  center: [48.72, 2.72],
  zoom: 10,
  zoomControl: true
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: ''
}).addTo(map);

// Add markers
const markers = {};
const legendEl = document.getElementById('legend');
const transcriptEl = document.getElementById('transcript-panel');

cities.forEach((city, i) => {
  // Create custom icon
  const iconHtml = `
    <div class="fantasy-marker">
      <div class="marker-icon">${city.icon}</div>
    </div>
  `;
  const customIcon = L.divIcon({
    html: iconHtml,
    className: '',
    iconSize: [38, 46],
    iconAnchor: [19, 46],
    popupAnchor: [0, -42]
  });

  const marker = L.marker([city.lat, city.lng], { icon: customIcon }).addTo(map);

  const popupContent = `
    <div class="popup-inner">
      <div class="city-name">${city.name}</div>
      <div class="city-race"><span class="race-icon">${city.icon}</span> ${city.race}</div>
      <div class="divider"></div>
      <div class="description">« ${city.description} »</div>
      <div class="divider"></div>
      <div class="pop-badge">
        🏘️ <span class="pop-number">${city.population.toLocaleString('fr-FR')}</span> <span>âmes</span>
      </div>
    </div>
  `;
  marker.bindPopup(popupContent, { maxWidth: 320 });
  markers[city.name] = marker;

  // Legend item
  const li = document.createElement('div');
  li.className = 'legend-item';
  li.innerHTML = `<span class="li-icon">${city.icon}</span><span class="li-name">${city.name}</span>`;
  li.onclick = () => {
    map.flyTo([city.lat, city.lng], 13, { duration: 0.8 });
    setTimeout(() => marker.openPopup(), 800);
  };
  legendEl.appendChild(li);

  // Transcript block
  const tb = document.createElement('div');
  tb.className = 'transcript-block';
  tb.innerHTML = `
    <div class="tb-city">${city.icon} ${city.name} <span style="color:#a0896a;font-weight:400;font-size:0.8rem;">(${city.population.toLocaleString('fr-FR')} hab.)</span></div>
    <div class="tb-text">« ${city.description} »</div>
  `;
  tb.onclick = () => {
    map.flyTo([city.lat, city.lng], 13, { duration: 0.8 });
    setTimeout(() => marker.openPopup(), 800);
    if (window.innerWidth <= 600) toggleTranscript();
  };
  transcriptEl.appendChild(tb);
});

// Transcript toggle
function toggleTranscript() {
  document.getElementById('transcript-panel').classList.toggle('open');
}

// Intro text as transcript header
const introBlock = document.createElement('div');
introBlock.className = 'transcript-block';
introBlock.style.borderLeftColor = '#c9a84c';
introBlock.style.marginBottom = '20px';
introBlock.innerHTML = `
  <div class="tb-city">🗺️ Introduction</div>
  <div class="tb-text">« On va dans le 77, une terre souvent citée par les parisiens comme étant remplie de contes et légendes. »</div>
`;
transcriptEl.insertBefore(introBlock, transcriptEl.children[2]);

// Fix: prevent Leaflet popup close button from causing page navigation
map.on('popupopen', function() {
  const closeButtons = document.querySelectorAll('.leaflet-popup-close-button');
  closeButtons.forEach(btn => {
    btn.setAttribute('href', 'javascript:void(0)');
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      map.closePopup();
    });
  });
});
</script>
</body>
</html>
